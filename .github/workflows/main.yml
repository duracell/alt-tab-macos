name: Build AltTab (Select Version)

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Tag or branch to compile (e.g., v11.1.0, v10.12.0, master)'
        required: true
        default: 'v11.1.0'

permissions:
  contents: write # Required to publish a release

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version_tag }}

      - name: Resolve Dependencies
        run: |
          if [ -f "Podfile" ]; then
            echo "CocoaPods detected. Installing dependencies..."
            pod install
            # Set environment variable to build the workspace
            echo "BUILD_TARGET=-workspace alt-tab-macos.xcworkspace" >> $GITHUB_ENV
          else
            echo "No Podfile detected. Resolving Swift Package Manager dependencies..."
            xcodebuild -resolvePackageDependencies
            # Set environment variable to build the project file directly
            echo "BUILD_TARGET=-project alt-tab-macos.xcodeproj" >> $GITHUB_ENV
          fi

      - name: Compile macOS App
        run: |
          xcodebuild $BUILD_TARGET \
                     -scheme "Release" \
                     -configuration Release \
                     -derivedDataPath Build/ \
                     -sdk macosx \
                     CODE_SIGN_IDENTITY="-" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=YES

      - name: Compress App to ZIP
        run: |
          cd Build/Build/Products/Release
          zip -r AltTab.zip AltTab.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "release-${{ github.event.inputs.version_tag }}"
          name: "AltTab ${{ github.event.inputs.version_tag }} (Custom Build)"
          body: "Custom build of AltTab compiled using GitHub Actions. Pre-compiled for personal use."
          draft: false
          prerelease: false
          files: Build/Build/Products/Release/AltTab.zip
