name: Build AltTab (Select Version)

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Tag or branch to compile (e.g., v11.1.0, v10.12.0, master)'
        required: true
        default: 'v11.1.0'

permissions:
  contents: write # Required for GitHub Actions to create and publish a release

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version_tag }}

      - name: Install CocoaPods Dependencies
        run: |
          pod install

      - name: Compile macOS App
        run: |
          xcodebuild -workspace alt-tab-macos.xcworkspace \
                     -scheme "Release" \
                     -configuration Release \
                     -derivedDataPath Build/ \
                     -sdk macosx \
                     CODE_SIGN_IDENTITY="-" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=YES

      - name: Compress App to ZIP
        run: |
          cd Build/Build/Products/Release
          zip -r AltTab.zip AltTab.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "release-${{ github.event.inputs.version_tag }}"
          name: "AltTab ${{ github.event.inputs.version_tag }} (Custom Build)"
          body: "Custom build of AltTab compiled using GitHub Actions. Pre-compiled for personal use."
          draft: false
          prerelease: false
          files: Build/Build/Products/Release/AltTab.zip
